<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Brian Home Document AI</title>

    <!-- SAP Theming Base (Morning Horizon) -->
    <link href="https://unpkg.com/@sap-theming/theming-base-content/content/Base/baseLib/sap_horizon/css_variables.css"
        rel="stylesheet">
    <!-- Fundamental Styles -->
    <link href="https://unpkg.com/fundamental-styles@latest/dist/fundamental-styles.css" rel="stylesheet">
    <!-- Fundamental Styles Theme -->
    <link href="https://unpkg.com/fundamental-styles@latest/dist/theming/sap_horizon.css" rel="stylesheet">
    <!-- SAP Icons Font -->
    <link
        href="https://unpkg.com/@sap-theming/theming-base-content/content/Base/baseLib/sap_horizon/fonts/72-Light.woff2"
        as="font" type="font/woff2" crossorigin>
    <link
        href="https://unpkg.com/@sap-theming/theming-base-content/content/Base/baseLib/sap_horizon/fonts/72-Regular.woff2"
        as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="/main.css">
</head>

<body class="fd-page">
    <div class="auth-container">
        <div class="fd-card" role="region" aria-label="Login Card">
            <div class="fd-card__header" style="text-align: center;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="var(--sapBrandColor)" stroke-width="2" width="32"
                        height="32">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span style="font-size: 1.3rem; font-weight: 700; color: var(--sapTextColor);">Brian Home Document
                        AI</span>
                </div>
            </div>

            <div class="fd-card__content">
                <!-- Tab Bar -->
                <div class="fd-icon-tab-bar fd-icon-tab-bar--compact" style="margin-bottom: 1.5rem;">
                    <ul role="tablist" class="fd-icon-tab-bar__header">
                        <li role="presentation" class="fd-icon-tab-bar__item fd-icon-tab-bar__item--positive">
                            <a role="tab" class="fd-icon-tab-bar__tab" id="tabLogin" aria-selected="true" tabindex="0">
                                <span class="fd-icon-tab-bar__tag">Sign In</span>
                            </a>
                        </li>
                        <li role="presentation" class="fd-icon-tab-bar__item">
                            <a role="tab" class="fd-icon-tab-bar__tab" id="tabSignup" aria-selected="false"
                                tabindex="-1">
                                <span class="fd-icon-tab-bar__tag">Sign Up</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <!-- Error Message Strip -->
                <div id="errorMessage" class="fd-message-strip fd-message-strip--error fd-message-strip--dismissible"
                    role="alert" style="display: none; margin-bottom: 1rem;">
                    <p class="fd-message-strip__text"></p>
                </div>
                <!-- Success Message Strip -->
                <div id="successMessage"
                    class="fd-message-strip fd-message-strip--success fd-message-strip--dismissible" role="alert"
                    style="display: none; margin-bottom: 1rem;">
                    <p class="fd-message-strip__text"></p>
                </div>

                <!-- Login Form -->
                <form id="loginForm">
                    <div class="fd-form-group">
                        <div class="fd-form-item">
                            <label class="fd-form-label" for="loginEmail">Email</label>
                            <input class="fd-input" type="email" id="loginEmail" placeholder="you@example.com" required>
                        </div>
                        <div class="fd-form-item" style="margin-top: 1rem;">
                            <label class="fd-form-label" for="loginPassword">Password</label>
                            <input class="fd-input" type="password" id="loginPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="fd-button fd-button--emphasized" id="loginBtn"
                        style="width: 100%; margin-top: 1.25rem;">Sign In</button>
                </form>

                <!-- Signup Form (hidden by default) -->
                <form id="signupForm" style="display: none;">
                    <div class="fd-form-group">
                        <div class="fd-form-item">
                            <label class="fd-form-label" for="signupName">Full Name</label>
                            <input class="fd-input" type="text" id="signupName" placeholder="John Doe" required>
                        </div>
                        <div class="fd-form-item" style="margin-top: 1rem;">
                            <label class="fd-form-label" for="signupEmail">Email</label>
                            <input class="fd-input" type="email" id="signupEmail" placeholder="you@example.com"
                                required>
                        </div>
                        <div class="fd-form-item" style="margin-top: 1rem;">
                            <label class="fd-form-label" for="signupPassword">Password</label>
                            <input class="fd-input" type="password" id="signupPassword" placeholder="••••••••"
                                minlength="6" required>
                        </div>
                    </div>
                    <button type="submit" class="fd-button fd-button--emphasized" id="signupBtn"
                        style="width: 100%; margin-top: 1.25rem;">Create Account</button>
                </form>

                <!-- Divider -->
                <div
                    style="display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--sapContent_LabelColor); font-size: 0.85rem;">
                    <div style="flex: 1; height: 1px; background: var(--sapGroup_TitleBorderColor);"></div>
                    or continue with
                    <div style="flex: 1; height: 1px; background: var(--sapGroup_TitleBorderColor);"></div>
                </div>

                <!-- Google Auth -->
                <button class="fd-button fd-button--transparent" id="googleBtn"
                    style="width: 100%; border: 1px solid var(--sapButton_BorderColor);">
                    <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right: 8px;">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Google
                </button>

                <p style="text-align: center; color: var(--sapContent_LabelColor); font-size: 0.9rem; margin-top: 1.25rem;"
                    id="switchText">
                    Don't have an account? <a href="#" id="switchToSignup" class="fd-link">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Supabase config
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const isConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
        let supabaseClient = null;

        if (isConfigured) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (session) window.location.href = '/';
            });
        }

        // Tab switching
        const tabLogin = document.getElementById('tabLogin');
        const tabSignup = document.getElementById('tabSignup');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const switchText = document.getElementById('switchText');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        function showLogin() {
            tabLogin.setAttribute('aria-selected', 'true');
            tabLogin.closest('.fd-icon-tab-bar__item').classList.add('fd-icon-tab-bar__item--positive');
            tabSignup.setAttribute('aria-selected', 'false');
            tabSignup.closest('.fd-icon-tab-bar__item').classList.remove('fd-icon-tab-bar__item--positive');
            loginForm.style.display = 'block';
            signupForm.style.display = 'none';
            switchText.innerHTML = 'Don\'t have an account? <a href="#" id="switchToSignup" class="fd-link">Sign up</a>';
            document.getElementById('switchToSignup').onclick = (e) => { e.preventDefault(); showSignup(); };
            hideMessages();
        }

        function showSignup() {
            tabLogin.setAttribute('aria-selected', 'false');
            tabLogin.closest('.fd-icon-tab-bar__item').classList.remove('fd-icon-tab-bar__item--positive');
            tabSignup.setAttribute('aria-selected', 'true');
            tabSignup.closest('.fd-icon-tab-bar__item').classList.add('fd-icon-tab-bar__item--positive');
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
            switchText.innerHTML = 'Already have an account? <a href="#" id="switchToLogin" class="fd-link">Sign in</a>';
            document.getElementById('switchToLogin').onclick = (e) => { e.preventDefault(); showLogin(); };
            hideMessages();
        }

        function showError(msg) {
            errorMessage.querySelector('.fd-message-strip__text').textContent = msg;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        function showSuccess(msg) {
            successMessage.querySelector('.fd-message-strip__text').textContent = msg;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        tabLogin.onclick = showLogin;
        tabSignup.onclick = showSignup;
        document.getElementById('switchToSignup').onclick = (e) => { e.preventDefault(); showSignup(); };

        // Demo mode
        if (!isConfigured) {
            loginForm.onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                if (email && password.length >= 6) {
                    localStorage.setItem('docai_user', JSON.stringify({ email, name: email.split('@')[0] }));
                    window.location.href = '/';
                } else {
                    showError('Invalid credentials');
                }
            };

            signupForm.onsubmit = async (e) => {
                e.preventDefault();
                const name = document.getElementById('signupName').value;
                const email = document.getElementById('signupEmail').value;
                const password = document.getElementById('signupPassword').value;
                if (name && email && password.length >= 6) {
                    localStorage.setItem('docai_user', JSON.stringify({ email, name }));
                    showSuccess('Account created! Redirecting...');
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    showError('Please fill in all fields (password min 6 chars)');
                }
            };
        } else {
            // Supabase Auth
            loginForm.onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                document.getElementById('loginBtn').disabled = true;
                document.getElementById('loginBtn').textContent = 'Signing in...';
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    showError(error.message);
                    document.getElementById('loginBtn').disabled = false;
                    document.getElementById('loginBtn').textContent = 'Sign In';
                } else {
                    window.location.href = '/';
                }
            };

            signupForm.onsubmit = async (e) => {
                e.preventDefault();
                const name = document.getElementById('signupName').value;
                const email = document.getElementById('signupEmail').value;
                const password = document.getElementById('signupPassword').value;
                document.getElementById('signupBtn').disabled = true;
                document.getElementById('signupBtn').textContent = 'Creating account...';
                const { error } = await supabaseClient.auth.signUp({
                    email, password,
                    options: { data: { full_name: name } }
                });
                if (error) {
                    showError(error.message);
                    document.getElementById('signupBtn').disabled = false;
                    document.getElementById('signupBtn').textContent = 'Create Account';
                } else {
                    showSuccess('Check your email to confirm your account!');
                    document.getElementById('signupBtn').textContent = 'Create Account';
                }
            };

            document.getElementById('googleBtn').onclick = async () => {
                await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
            };
        }
    </script>
</body>

</html>
